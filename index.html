        display: none;
      }

      .digest-rail {
        gap: 14px;
      }

      nav {
        width: 100%;
        padding-left: 24px;
        padding-right: 158px;
        gap: 12px 20px;
      }

      .nav-links {
        width: 100%;
        gap: 12px 20px;
      }

      .logo-mark {
        max-height: 80px;
        margin: 0;
      }

      .logo {
        padding-left: 2px;
        padding-right: 0;
        margin: 0;
      }

      .logo-mark-shell {
        min-height: 50px;
      }

      .logo-title-shell {
        min-height: 50px;
        max-width: calc(100vw - 150px);
        margin-right: 0;
      }

      .logo-title {
        max-height: 80px;
        margin: 0;
      }

      nav {
        margin-top: 0;
      }

      body.nav-editorial nav {
        padding-top: 10px;
        padding-bottom: 8px;
      }

      body.nav-editorial nav {
        gap: 8px 16px;
      }

      body.nav-editorial .nav-links {
        width: 100%;
        gap: 8px 16px;
      }

      .nav-links a + a::before {
        left: -9px;
      }

      .nav-search {
        width: auto;
      }

      .nav-search input {
        width: 148px;
        max-width: none;
      }

      nav a {
        display: inline-block;
      }

      .score-track {
        animation-duration: 60s;
      }
    }
  </style>
</head>
<body class="nav-editorial layout-digest">

  <header>
    <div class="top-bar">
      <a href="#" class="logo" aria-label="DownField Sports home">
        <span class="logo-mark-shell">
          <img class="logo-mark" src="Images/DFS%20Logo/Title%20Images/DFS_primary_true_transparent_attempt.png" alt="DownField Sports logo">
        </span>
        <span class="logo-title-shell">
          <img class="logo-title" src="Images/DFS%20Logo/Title%20Images/downfield_sports_ultra_clean.png" alt="DownField Sports">
        </span>
      </a>
      <nav>
        <div class="nav-links">
          <a href="#">NFL</a>
          <a href="#">MLB</a>
          <a href="#">Fantasy Football</a>
        </div>
        <form class="nav-search" action="#" role="search">
          <input type="search" name="q" placeholder="Search">
          <span class="nav-search-icon" aria-hidden="true">⌕</span>
        </form>
      </nav>
    </div>
  </header>

  <div class="score-ticker">
    <div class="score-track" id="scoreTrack">
      <span class="score-item">Loading MLB and NFL scores...</span>
    </div>
  </div>

  <main class="container">
    <section class="featured" id="featuredSection"></section>
    <section class="featured-trending" id="trendingSection"></section>
    <section class="latest-section" id="latestSection"></section>
  </main>

  <footer>
    <p>© 2026 DownField Sports. All rights reserved.</p>
  </footer>

  <script src="content/featured/featured.js"></script>
  <script src="content/side-stories/side-stories.js"></script>
  <script src="content/trending/trending.js"></script>
  <script src="content/latest/latest.js"></script>
  <script src="content/quick-reads/quick-reads.js"></script>
  <script src="content/newsletter/newsletter.js"></script>
  <script src="articles.js"></script>
  <script>
    const featuredSection = document.getElementById("featuredSection");
    const trendingSection = document.getElementById("trendingSection");
    const latestSection = document.getElementById("latestSection");
    const scoreTrack = document.getElementById("scoreTrack");
    const homepageData = window.homepageData;

    function formatDisplayDate(dateString) {
      return new Date(`${dateString}T12:00:00`).toLocaleDateString("en-US", {
        month: "short",
        day: "numeric",
        year: "numeric"
      });
    }

    function renderFeaturedSection() {
      const { featured, sideStories } = homepageData;
      featuredSection.innerHTML = `
        <a href="${featured.href}" class="featured-main" data-disqus-identifier="${featured.href}" data-disqus-url="https://downfieldsports.com/${featured.href}">
          <img src="${featured.image}" alt="${featured.alt}">
          <div class="featured-content">
            <span class="article-meta">${formatDisplayDate(featured.publishedAt)}</span>
            <h1>${featured.title}</h1>
            <p>${featured.summary}</p>
            <span class="read-more">Read Full Article</span>
          </div>
        </a>
        <div class="side-stories">
          ${sideStories.map((story) => `
            <a href="${story.href}" class="side-story" data-disqus-identifier="${story.href}" data-disqus-url="https://downfieldsports.com/${story.href}">
              <img src="${story.image}" alt="${story.alt}">
              <div class="side-story-content">
                <span class="article-meta">${formatDisplayDate(story.publishedAt)}</span>
                <h3>${story.title}</h3>
                <p>${story.summary}</p>
              </div>
            </a>
          `).join("")}
        </div>
      `;
    }

    function renderListItems(items) {
      return items.map((item) => `
        <a href="${item.href}">
          <div class="digest-item-copy">
            <strong>${item.title}</strong>
            <span>${item.category}</span>
          </div>
          <span class="digest-date">${formatDisplayDate(item.publishedAt)}</span>
        </a>
      `).join("");
    }

    function renderTrendingSection() {
      trendingSection.innerHTML = `
        <h2 class="section-title">Trending Now</h2>
        <div class="trending-strip">
          <div class="digest-block">
            <div class="digest-list">
              ${renderListItems(homepageData.trending)}
            </div>
          </div>
        </div>
      `;
    }

    function renderLatestSection() {
      latestSection.innerHTML = `
        <h2 class="section-title">Latest Articles</h2>
        <div class="article-grid">
          ${homepageData.latest.map((article) => `
            <a href="${article.href}" class="article-card" data-disqus-identifier="${article.href}" data-disqus-url="https://downfieldsports.com/${article.href}">
              <img src="${article.image}" alt="${article.alt}">
              <div class="article-content">
                <span class="article-meta">${formatDisplayDate(article.publishedAt)}</span>
                <h3>${article.title}</h3>
                <p>${article.summary}</p>
                <span class="article-link">Go to article →</span>
              </div>
            </a>
          `).join("")}
        </div>
        <aside class="digest-rail">
          <div class="digest-block">
            <h3>Quick Reads</h3>
            <div class="digest-list">
              ${renderListItems(homepageData.quickReads)}
            </div>
          </div>
          <div class="digest-promo">
            <h3>${homepageData.newsletter.title}</h3>
            <p>${homepageData.newsletter.copy}</p>
            <a href="${homepageData.newsletter.href}">${homepageData.newsletter.cta} →</a>
          </div>
        </aside>
      `;
    }

    function renderHomepage() {
      renderFeaturedSection();
      renderTrendingSection();
      renderLatestSection();
    }

    function formatEvent(event, leagueLabel) {
      const comp = event.competitions && event.competitions[0];
      if (!comp || !comp.competitors || comp.competitors.length < 2) return "";

      const home = comp.competitors.find(team => team.homeAway === "home");
      const away = comp.competitors.find(team => team.homeAway === "away");

      if (!home || !away) return "";

      const homeName = home.team?.abbreviation || "HOME";
      const awayName = away.team?.abbreviation || "AWAY";
      const homeScore = home.score ?? "-";
      const awayScore = away.score ?? "-";
      const status = comp.status?.type?.shortDetail || "Scheduled";

      const eventLink =
        event.links?.[0]?.href ||
        event.link ||
        "#";

      return `
        <a class="score-link score-item" href="${eventLink}" target="_blank" rel="noopener noreferrer">
          ${leagueLabel}: ${awayName} ${awayScore} - ${homeName} ${homeScore} | ${status}
        </a>
      `;
    }

    async function fetchLeagueScores(url, leagueLabel, limit = 8) {
      const response = await fetch(url);
      if (!response.ok) {
        throw new Error(`Failed to load ${leagueLabel} scores`);
      }

      const data = await response.json();
      const events = data.events || [];

      return events
        .slice(0, limit)
        .map(event => formatEvent(event, leagueLabel))
        .filter(Boolean);
    }

    async function loadScores() {
      try {
        const [mlbScores, nflScores] = await Promise.all([
          fetchLeagueScores(
            "https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/scoreboard",
            "MLB",
            10
          ),
          fetchLeagueScores(
            "https://site.api.espn.com/apis/site/v2/sports/football/nfl/scoreboard",
            "NFL",
            10
          )
        ]);

        const allScores = [...mlbScores, ...nflScores];

        if (!allScores.length) {
          scoreTrack.innerHTML = `<span class="score-item">No MLB or NFL games available right now.</span>`;
          return;
        }

        scoreTrack.innerHTML = allScores.join("");
      } catch (error) {
        console.error(error);
        scoreTrack.innerHTML = `<span class="score-item">Unable to load live scores right now.</span>`;
      }
    }

    renderHomepage();
    loadScores();
    setInterval(loadScores, 60000);
  </script>

</body>
</html>
